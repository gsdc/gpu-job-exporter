name: Build RPM

on:
  push:
    tags:
      - 'v*'

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - el: "7"
            image: "centos:7"
          - el: "9"
            image: "almalinux:9"
    # container: 제거 — Node.js 20 기반 액션(checkout, upload-artifact)은
    # CentOS 7의 GLIBC 2.17과 호환되지 않으므로 호스트에서 실행한다.
    # 빌드만 docker run으로 컨테이너 안에서 수행한다.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG}, Version: ${VERSION}"

      # EL7의 Python 3.6에서 작동하는 버전으로 의존성 제한
      #   prometheus_client >= 0.20.0 → Python 3.8+ 필요
      #   psutil >= 5.9.6            → Python 3.6 지원 종료
      - name: Pin Python 3.6-compatible dependencies (EL7)
        if: matrix.el == '7'
        run: |
          cat > requirements.txt << 'EOF'
          prometheus_client>=0.7.0,<0.20.0
          psutil>=5.9.0,<5.9.6
          pynvml>=11.4.1
          EOF

      - name: Update version in spec and build script
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^Version:.*/Version:        ${VERSION}/" gpu-job-exporter.spec

          DATE=$(date +"%a %b %d %Y")
          sed -i "/^%changelog/a * ${DATE} GitHub Actions <actions@github.com> - ${VERSION}-1\n- Release ${VERSION}" \
              gpu-job-exporter.spec

          sed -i "s/^VERSION=.*/VERSION=\"${VERSION}\"/" build_rpm.sh

          echo "--- spec/build_rpm.sh version check ---"
          grep "^Version:" gpu-job-exporter.spec
          grep "^VERSION=" build_rpm.sh

      - name: Build RPM (EL7)
        if: matrix.el == '7'
        run: |
          mkdir -p rpmbuild
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${GITHUB_WORKSPACE}/rpmbuild:/root/rpmbuild" \
            -w /workspace \
            centos:7 bash -c '
              set -euo pipefail
              sed -i "s/mirrorlist/#mirrorlist/g" /etc/yum.repos.d/CentOS-*.repo
              sed -i "s|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g" \
                  /etc/yum.repos.d/CentOS-*.repo
              yum install -y epel-release
              sed -i "s|^mirrorlist=|#mirrorlist=|g" /etc/yum.repos.d/epel*.repo
              sed -i "s|^#baseurl=http://download.fedoraproject.org/pub/epel|baseurl=https://archives.fedoraproject.org/pub/archive/epel|g" \
                  /etc/yum.repos.d/epel*.repo
              yum install -y rpm-build python3 python3-pip python3-devel gcc systemd
              bash build_rpm.sh
            '

      - name: Build RPM (EL9)
        if: matrix.el == '9'
        run: |
          mkdir -p rpmbuild
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${GITHUB_WORKSPACE}/rpmbuild:/root/rpmbuild" \
            -w /workspace \
            almalinux:9 bash -c '
              set -euo pipefail
              dnf install -y rpm-build python3 python3-pip systemd-rpm-macros
              bash build_rpm.sh
            '

      - name: List built RPMs
        run: find rpmbuild/RPMS rpmbuild/SRPMS -name "*.rpm" | sort

      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: rpms-el${{ matrix.el }}
          path: rpmbuild/RPMS/**/*.rpm

      - name: Upload SRPMs
        uses: actions/upload-artifact@v4
        with:
          name: srpms-el${{ matrix.el }}
          path: rpmbuild/SRPMS/**/*.rpm

  release:
    needs: build-rpm
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all RPM artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List downloaded artifacts
        run: find artifacts/ -name "*.rpm" | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "gpu-job-exporter ${{ steps.version.outputs.tag }}"
          body: |
            ## gpu-job-exporter ${{ steps.version.outputs.tag }}

            EL7 (CentOS 7) 및 EL9 (AlmaLinux 9 / Rocky Linux 9) 환경에서 자동 빌드된 RPM 패키지입니다.

            ### 설치 방법 (EL9 / AlmaLinux 9 / Rocky Linux 9)
            ```bash
            sudo dnf install gpu-job-exporter-${{ steps.version.outputs.version }}-1.el9.x86_64.rpm
            ```

            ### 설치 방법 (EL7 / CentOS 7)
            ```bash
            # EPEL의 python3 패키지가 필요합니다
            sudo yum install epel-release
            sudo yum install gpu-job-exporter-${{ steps.version.outputs.version }}-1.el7.x86_64.rpm
            ```
          files: artifacts/**/*.rpm
          fail_on_unmatched_files: false
